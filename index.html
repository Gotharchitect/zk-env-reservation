<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Environment Reservations</title>
<style>
  :root {
    /* Colors pulled from the zkipster admin panel: dark navy chrome,
       amber/orange accent (CTA + highlight), blue avatar bubbles. */
    --bg: #0d0f14;
    --bg-header: #14171f;
    --panel-bg: #1a1d26;
    --panel-header: #20232e;
    --border: #2b2f3b;
    --text: #e8e9ec;
    --text-dim: #8a8f9c;
    --accent: #d98f4e;       /* amber/orange from the screenshot */
    --accent-dim: #8a5a30;
    --avatar-blue: #5b6fd8;  /* avatar bubble blue from the screenshot */
    --free: #3fb950;
    --busy: #f2495c;
    --busy-dim: #5c2530;
    --warn: #e0a030;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* Thin accent stripe, like the orange banner in the reference screenshot */
  .accent-stripe { height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-dim)); flex-shrink: 0; }

  header {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    flex-shrink: 0;
  }
  h1 {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1 .dot3 { display: inline-flex; gap: 3px; }
  h1 .dot3 span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
  h1 .dot3 span:nth-child(2) { background: var(--avatar-blue); }
  h1 .dot3 span:nth-child(3) { background: var(--free); }

  .whoami { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
  input#whoInput {
    font-size: 13px;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel-bg);
    color: var(--text);
    min-width: 200px;
  }
  input#whoInput:focus { outline: none; border-color: var(--accent); }

  main {
    flex: 1;
    padding: 20px;
    display: flex;
    min-height: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: 100%;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    background: var(--panel-header);
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .env-name { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }
  .status-pill {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 3px 9px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .status-pill.free { background: rgba(63,185,80,0.15); color: var(--free); }
  .status-pill.busy { background: rgba(242,73,92,0.15); color: var(--busy); }

  .panel-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 14px; }

  .current-block { display: flex; align-items: center; gap: 12px; min-height: 44px; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--avatar-blue);
    color: white; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .avatar.empty { background: var(--border); color: var(--text-dim); }
  .current-info { min-width: 0; }
  .current-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .current-time { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .current-time.overdue { color: var(--busy); font-weight: 600; }
  .current-empty { font-size: 13px; color: var(--text-dim); font-style: italic; }

  .progress-track { height: 5px; border-radius: 3px; background: var(--border); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--free); transition: width 0.3s; }
  .progress-fill.warn { background: var(--warn); }
  .progress-fill.overdue { background: var(--busy); }

  .queue-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 8px; }
  .queue-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .queue-list li {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
    padding: 6px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.02);
  }
  .queue-list .pos {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--panel-header);
    color: var(--accent);
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .queue-list .qname.open { color: var(--text-dim); font-style: italic; }
  .queue-list .qname.mine { color: var(--accent); font-weight: 600; }

  .panel-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  button {
    font-size: 13px;
    font-weight: 600;
    padding: 9px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel-header);
    color: var(--text);
    cursor: pointer;
    flex: 1;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #1a1200; }
  button.danger { background: var(--busy-dim); border-color: var(--busy); color: var(--busy); }

  .setup-warning {
    background: #3a2c12; border: 1px solid var(--accent); color: #f0c98a;
    padding: 10px 24px; font-size: 13px; flex-shrink: 0;
  }

  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--panel-header); color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 16px; border-radius: 6px; font-size: 13px;
    opacity: 0; transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
  <div class="accent-stripe"></div>

  <div id="setupWarning" class="setup-warning" style="display:none">
    ⚠️ config.js is still using placeholder values — edit it with your real Firebase project config before using this for real.
  </div>

  <header>
    <h1><span class="dot3"><span></span><span></span><span></span></span>Environment Reservations</h1>
    <div class="whoami">
      <label for="whoInput">I am</label>
      <input id="whoInput" list="whoList" placeholder="Type your name..." autocomplete="off">
      <datalist id="whoList"></datalist>
    </div>
  </header>

  <main>
    <div id="grid" class="grid"></div>
  </main>

  <div id="toast" class="toast"></div>

  <script type="module" src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
